name: "poc-app-zapp"
description: | 
  This is a sample IBM Z Open Editor zapp.yaml for DBB V3. 
  
  Change the VS Code user's settings.json dbbHLQ to defines the a developer's 
  personal PDS HLQ's for building and testing a feature. 

  ref: 
    - DBB v3:               https://www.ibm.com/docs/en/dbb/3.0?topic=samples-user-build
    - OpenEditor zapp.yaml: https://ibm.github.io/zopeneditor-about/Docs/zapp.html#zapp-use-cases  
  
  Tech Notes: - The main settings.json is in this multiRoot project's workspace file. Its not a local  file. Simple project can use .vscode/settings.json 
              - OpenEdit fails to mkdir the users dbbWorkspace so do it manually before runing  
              - Always run a full upload build to init the working dir with dbb-build.yaml
              - the user zapp  "dbbWorkspace": "/u/ibmuser/vscode",
              - the user zapp  "dbbHlq": "IBMUSER.VSCODE"   


version: "3.0.0"
author:
  name: "ANY_NAME"


profiles:
- name: "Idz_dbb-userbuild"
  type: "dbb"
  settings:    
    # Use /etc/profile or the users .profile with the DBB env
    # command: ". ./.profile; $DBB_HOME/bin/dbb   build" 
    
    # Version using the DBB Daemon for improved performance on virt Z env (ODT)      
    # When running DBB, it may be necessary to init a .profile as shown below 
    #command: ". /etc/profile; dbb   -DBB_DAEMON_PORT 8180       build "

    
    command: "dbb   -DBB_DAEMON_PORT 8180       build "
    
    
    lifecycle: "user"
    lifecycleArgs:
    - "--hlq ${dbbHlq}"
    additionalDependencies:
    - "dbb-app.yaml"
    logFilePatterns:
    - "*.log"

- name: "dbb-userbuild"
  type: "dbb"
  settings:
    # Use "IBM User BUild with full upload whenever the dbb-app-yaml is changed or on first build
    # Otherwise use "IBM User Build" for a slight performance improvement 

    # Notes on using DBB_DAEMON (DBBS STC):    
    #   As of dbb 3.0.1 the DBB sclient is in /usr/lpp/IBM/dbb/conf/startdaemon.sh with port 8180   

    # This version uses the DBB Daemon for improved performance on virt Z env (ODT)      
    # When running DBB, it may be necessary to init a .profile as shown below 
    #command: ". /etc/profile; dbb   -DBB_DAEMON_PORT 8180       build "
    
    command: "dbb   -DBB_DAEMON_PORT 8180       build "
    

        

    lifecycle: "user"
    lifecycleArgs:
    # HLQ is a user defined VS Code variable that points to a personal HLQ and Second level qualifier 
    # used by DBB to allocation working PDSs for the build. 
    - "--hlq ${zopeneditor.userbuild.userSettings.dbbHlq}"
    
    additionalDependencies:
    - "dbb-app.yaml"
    

    logFilePatterns:
    - "${buildFile.basename}-*.log"
    - "BuildReport.H*"


propertyGroups:
- name: cobol-copybooks
  language: cobol
  libraries:
    - name: syslib
      type: local
      locations:
        - "**/copybook"
        - "**/bms"
    - name: syslib
      type: mvs
      locations:        
        - "IBMUSER.VSCODE.COPY"        
        # The BMS COPY PDS points to existing BMS maps.  It is used to resolve COBOL CICS BMS copybooks.
        - "IBMUSER.VSCODE.BMS.COPY"        
        - "CICSTS62.CICS.SDFHCOB"
        - "IDZ.V17R0M0.SEQASAMP"

- name: asm-maclib 
  language: hlasm
  libraries:
    - name: maclib
      type: local
      locations:
        - "**/maclib"
        - "**/copybook"
    - name: syslib
      type: mvs
      locations:
        - "SYS1.MACLIB" 
